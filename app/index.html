<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Altao AR Product Gallery</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { margin: 0; text-align: center; font-family: sans-serif; background-color: #f8f9fa; }
    .controls { 
      margin-top: 20px; 
      display: flex; 
      justify-content: center; 
      flex-wrap: wrap; 
      gap: 10px; 
      padding: 0 15px;
    }
    .btn { 
      padding: 10px 18px; 
      font-weight: bold; 
      border: 2px solid #007bff; 
      background: white; 
      color: #007bff; 
      border-radius: 30px; 
      cursor: pointer; 
      transition: 0.3s;
    }
    .btn.active { background: #007bff; color: white; }
    #qrcode { margin-top: 20px; padding: 15px; background: white; display: inline-block; border-radius: 10px; }
    #ar-display { width: 100%; height: 50vh; background-color: #2c3e50; }
  </style>
</head>

<body>

  <h2 style="padding-top: 20px;">Altao AR: Product Gallery</h2>

  <model-viewer 
    id="ar-display" 
    src="Astronaut.glb" 
    ios-src="Astronaut.usdz"
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    auto-rotate 

    /* REALISM & LIGHTING */
    exposure="1.2" 
    shadow-intensity="1.5" 
    shadow-softness="0.5"
    tone-mapping="commerce"
    environment-image="neutral"
    
    /* INTERACTION SETTINGS */
    interaction-prompt="auto"
    touch-action="pan-y"
    interpolation-decay="200"
    ar-placement="floor">
    
    <button slot="ar-button" style="background: white; border-radius: 8px; border: none; padding: 12px 20px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
      👋 View in My Room
    </button>
  </model-viewer>

  <div class="controls">
    <button class="btn active" onclick="updateAll(this, 'Astronaut.glb','floor')">Astronaut</button>
    <button class="btn" onclick="updateAll(this, 'model_cealing fan.glb','wall')">Ceiling Fan</button>
    <button class="btn" onclick="updateAll(this, 'luxury.glb', 'oltao_iphone.usdz', 'floor')">Oltao Fan</button>
  </div>

  <div style="margin-top: 30px;">
    <div id="qrcode"></div>
    <p id="qr-label" style="color: #666; font-weight: bold; margin-top: 10px;">QR for: Astronaut.glb</p>
  </div>

  <script>
    let qrContainer = document.getElementById("qrcode");

    function updateAll(button, glbFile, usdzFile, placement) {
      const viewer = document.getElementById('ar-display');
      
      // 1. Update the 3D files for both platforms
      viewer.src = glbFile;
      viewer.setAttribute('ios-src', usdzFile);

      // 2. Dynamically change placement (floor or wall)
      viewer.setAttribute('ar-placement', placement);

      // 3. Update Button UI
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      button.classList.add('active');

      // 4. Update Labels and QR
      document.getElementById('qr-label').innerText = "QR for: " + glbFile;
      const baseUrl = window.location.href.split('?')[0]; 
      const uniqueUrl = baseUrl + "?model=" + encodeURIComponent(glbFile);
      generateQR(uniqueUrl);
    }

    function generateQR(url) {
      qrContainer.innerHTML = ""; 
      new QRCode(qrContainer, {
        text: url,
        width: 150,
        height: 150
      });
    }

    window.onload = () => { 
      const urlParams = new URLSearchParams(window.location.search);
      const modelParam = urlParams.get('model');
      
      if (modelParam) {
        const viewer = document.getElementById('ar-display');
        viewer.src = modelParam;
        // Defaulting to glb name for QR label
        document.getElementById('qr-label').innerText = "QR for: " + modelParam;
      }
      
      generateQR(window.location.href); 
    };
  </script>
</body>
</html>
