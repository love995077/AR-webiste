<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OLTAO AR Product Gallery</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { margin: 0; text-align: center; font-family: sans-serif; background-color: #f8f9fa; }
    .controls { 
      margin-top: 20px; 
      display: flex; 
      justify-content: center; 
      flex-wrap: wrap; 
      gap: 10px; 
      padding: 0 15px;
    }
    .btn { 
      padding: 10px 18px; 
      font-weight: bold; 
      border: 2px solid #007bff; 
      background: white; 
      color: #007bff; 
      border-radius: 30px; 
      cursor: pointer; 
      transition: 0.3s;
    }
    .btn.active { background: #007bff; color: white; }
    
    /* Power Button Styling */
    #power-btn {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border: 2px solid #28a745;
      background: #28a745;
      color: white;
      border-radius: 30px;
      margin-top: 15px;
      cursor: pointer;
      transition: 0.3s;
    }
    #power-btn:hover { opacity: 0.8; }

    #qrcode { margin-top: 20px; padding: 15px; background: white; display: inline-block; border-radius: 10px; }
    #ar-display { width: 100%; height: 50vh; background-color: #2c3e50; }
  </style>
</head>

<body>

  <h2 style="padding-top: 20px;"> OLTAO AR: Product Gallery</h2>

  <model-viewer 
    id="ar-display" 
    src="Astronaut.glb" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    time-scale="3"

    exposure="1.2" 
    shadow-intensity="1.5" 
    shadow-softness="0.5"
    tone-mapping="commerce"
    environment-image="neutral"
    
    interaction-prompt="auto"
    touch-action="pan-y"
    interpolation-decay="200"
    ar-placement="floor">
    
    <button slot="ar-button" style="background: white; border-radius: 8px; border: none; padding: 12px 20px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
      👋 View in My Room
    </button>
  </model-viewer>

  <div>
    <button id="power-btn" onclick="togglePower()">Turn On Fan 🌀</button>
  </div>

  <div class="controls">
    <button class="btn active" onclick="updateAll(this, 'Astronaut.glb')">Astronaut</button>
    <button class="btn" onclick="updateAll(this, 'model_cealing fan.glb')">Ceiling Fan</button>
    <button class="btn" onclick="updateAll(this, 'luxury.glb')">Luxury Fan</button>
    <button class="btn" onclick="updateAll(this, 'Oltao fan_file_(Optimised).glb')">OLTAO</button>
    <button class="btn" onclick="updateAll(this, 'oltao_animated.glb')">OLTAO animated</button>
  </div>

  <div style="margin-top: 30px;">
    <div id="qrcode"></div>
    <p id="qr-label" style="color: #666; font-weight: bold; margin-top: 10px;">QR for: Astronaut.glb</p>
  </div>

  <script>
    let qrContainer = document.getElementById("qrcode");
    let isFanOn = false; 

    // UPDATED: "Smart" Power Button Logic
    function togglePower() {
      const viewer = document.getElementById('ar-display');
      const powerBtn = document.getElementById('power-btn');
      
      // Get the current file name being viewed
      const currentModel = viewer.getAttribute('src');

      if (isFanOn) {
        // TURN OFF EVERYTHING
        viewer.pause(); // Stop real animation
        viewer.removeAttribute('auto-rotate'); // Stop fake hack spin
        
        powerBtn.innerText = "Turn On Fan 🌀";
        powerBtn.style.background = "#28a745"; 
        powerBtn.style.borderColor = "#28a745";
      } else {
        // TURN ON EVERYTHING
        viewer.play(); // Play real animation (for oltao_animated.glb)
        
        // If it's NOT the animated fan, keep using the fake spin hack
        if (currentModel !== 'oltao_animated.glb') {
            viewer.setAttribute('auto-rotate', 'true');
            viewer.setAttribute('rotation-per-second', '500deg'); 
        }
        
        powerBtn.innerText = "Turn Off Fan 🛑";
        powerBtn.style.background = "#dc3545"; 
        powerBtn.style.borderColor = "#dc3545";
      }
      isFanOn = !isFanOn;
    }

    function updateAll(button, modelFile) {
      const viewer = document.getElementById('ar-display');
      const powerBtn = document.getElementById('power-btn');

      viewer.setAttribute('src', modelFile);

      // Reset everything when a new model is clicked
      viewer.pause();
      viewer.removeAttribute('auto-rotate'); 
      isFanOn = false;
      powerBtn.innerText = "Turn On Fan 🌀";
      powerBtn.style.background = "#28a745";
      powerBtn.style.borderColor = "#28a745";

      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      button.classList.add('active');

      document.getElementById('qr-label').innerText = "QR for: " + modelFile;

      const baseUrl = window.location.href.split('?')[0]; 
      const uniqueUrl = baseUrl + "?model=" + encodeURIComponent(modelFile);
      
      generateQR(uniqueUrl);
    }

    function generateQR(url) {
      qrContainer.innerHTML = ""; 
      new QRCode(qrContainer, {
        text: url,
        width: 150,
        height: 150
      });
    }

    window.onload = () => { 
      const urlParams = new URLSearchParams(window.location.search);
      const modelParam = urlParams.get('model');
      
      if (modelParam) {
        const viewer = document.getElementById('ar-display');
        viewer.setAttribute('src', modelParam);
        document.getElementById('qr-label').innerText = "QR for: " + modelParam;
      }
      
      generateQR(window.location.href); 
    };
  </script>
</body>
</html>
